server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:13100/loki/api/v1/push

scrape_configs:
- job_name: zeek-logs
  static_configs:
  - targets:
      - localhost
    labels:
      job: zeeklogs
      __path__: /var/zeek/logs/*log
