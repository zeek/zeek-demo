services:
  zeek:
    build:
      context: containers/zeek-systemd-udp
      dockerfile: Dockerfile

    # The Zeek container uses systemd inside, so need to pre-mount
    # a few things. If this scares you, use podman instead. The
    # rw /sys/fs/cgroup mount is needed such that systemd can manage
    # its own cgroup hierarchy.
    volumes:
      - type: bind
        source: /sys/fs/cgroup
        target: /sys/fs/cgroup
    tmpfs:
      - /run
      - /tmp
    cgroup: host
    stop_signal: SIGRTMIN+3
    tty: true

    # Port forwarding for Geneve and VXLAN traffic. Note that you
    # should the following in /etc/docker/daemon.json:
    #     "userland-proxy": false
    #
    # This avoids the daemon causing packet re-ordering when its threads
    # are moving between CPUs (or pin the userland docker-proxy process
    # to a single CPU).
    ports:
      - "127.0.0.1:6081:6081/udp"
      - "127.0.0.1:4789:4789/udp"
    networks:
      - monitoring
      - telemetry

  loki:
    build:
      context: containers/loki
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:13100:3100"
    networks:
      - telemetry

  prometheus:
    build:
      context: containers/prometheus
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:19090:9090"
    networks:
      - telemetry

  grafana:
    build:
      context: containers/grafana
      dockerfile: Dockerfile
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-zeek}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-zeek}
    ports:
      - "127.0.0.1:13000:3000"
    networks:
      - telemetry

networks:
  telemetry: {}
  # Allow jumbo frames and name the bridge for monitoring.
  monitoring:
    driver_opts:
      com.docker.network.driver.mtu: 9216
      com.docker.network.bridge.name: br-zeekmon0
